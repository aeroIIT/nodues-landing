# Netlify configuration for the NoDues landing page (Vite + React static SPA)

[build]
  command = "pnpm build"
  publish = "dist/public"

[build.environment]
  # Vite 7 needs Node >= 20.19 / 22.12; pin a known-good major.
  NODE_VERSION = "22"

# Single-page-app fallback: let client-side routes (wouter) resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
