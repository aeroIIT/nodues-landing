name: nodues-landing

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitLab Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Build, tag, and push Docker image to GitLab
        env:
          GITLAB_REGISTRY: registry.gitlab.com
          GITLAB_PROJECT: ${{ secrets.GITLAB_USERNAME }}/deploy
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $GITLAB_REGISTRY/$GITLAB_PROJECT/nodues-landing:$IMAGE_TAG \
                       -t $GITLAB_REGISTRY/$GITLAB_PROJECT/nodues-landing:latest \
                       .
          docker push $GITLAB_REGISTRY/$GITLAB_PROJECT/nodues-landing:$IMAGE_TAG
          docker push $GITLAB_REGISTRY/$GITLAB_PROJECT/nodues-landing:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.180.25.253
          username: joeydash
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd coolify
            bash setup.sh build nodues-landing


  notify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Send WhatsApp Deployment Notification
        env:
          PUSHER: ${{ github.actor }}
        run: |
          curl -X POST "https://whatsappv3.subspace.money/send_from_support" \
            -H "X-API-Key: vl_b4e17acd3ac65552cebc3e1f6ad51a37a4e73bd5a0fe3f267a9462988a87ded1" \
            -H "Content-Type: application/json" \
            -d "{
              \"to\": \"Vocallabs Tech\",
              \"message\": \"Deployed NoDues Landing Page to Production ✅\\nPushed by: $PUSHER\",
              \"isGroup\": \"Y\",
              \"mentions\": \"\"
            }"
